name: Server Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      mysql:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: System-Abhängigkeiten
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server libmariadb-dev libcups2-dev

      - name: frappe-bench installieren
        run: pip install frappe-bench

      - name: Bench aufsetzen und App installieren
        run: bash .github/scripts/install.sh
        env:
          FRAPPE_BRANCH: version-15

      - name: Tests ausführen
        run: |
          cd $HOME/frappe-bench
          bench --site test_site run-tests --app ktesis --verbose
