name: Ktesis Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Abhaengigkeiten installieren
        run: pip install frappe

      - name: CSV Import Tests
        run: python3 ktesis/tests/test_csv_import.py -v

      - name: Frontend-Backend Sync Tests
        run: python3 ktesis/tests/test_api_sync.py -v

      - name: Python Syntax Check
        run: |
          find ktesis/api -name '*.py' | while read f; do
            python3 -m py_compile "$f" && echo "OK: $f" || { echo "FEHLER: $f"; exit 1; }
          done
