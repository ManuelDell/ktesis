name: Server Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      mysql:
        image: mariadb:10.6
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: System-Abhängigkeiten
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server libmariadb-dev libcups2-dev mariadb-client

      - name: frappe-bench installieren
        run: pip install frappe-bench

      - name: bench init
        run: |
          bench init \
            --frappe-branch version-15 \
            --skip-assets \
            ~/frappe-bench

      - name: MariaDB Benutzer anlegen
        run: |
          mysql -h 127.0.0.1 -u root <<'SQL'
          CREATE USER IF NOT EXISTS 'test_frappe'@'localhost' IDENTIFIED BY 'test_frappe';
          GRANT ALL PRIVILEGES ON *.* TO 'test_frappe'@'localhost' WITH GRANT OPTION;
          FLUSH PRIVILEGES;
          SQL

      - name: bench new-site
        run: |
          cd ~/frappe-bench
          bench set-config -g db_host 127.0.0.1
          bench new-site test_site \
            --db-root-username root \
            --db-root-password "" \
            --admin-password admin

      - name: ktesis installieren
        run: |
          cd ~/frappe-bench
          bench get-app ktesis $GITHUB_WORKSPACE
          bench --site test_site install-app ktesis

      - name: Tests ausführen
        run: |
          cd ~/frappe-bench
          bench --site test_site run-tests --app ktesis --verbose
