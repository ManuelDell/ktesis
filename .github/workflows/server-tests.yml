name: Server Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress only for PRs; pushes to main always complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      mysql:
        image: mariadb:10.6
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: System-Abhängigkeiten
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server libmariadb-dev libcups2-dev mariadb-client

      - name: frappe-bench installieren
        run: pip install frappe-bench

      - name: Bench aufsetzen und App installieren
        run: bash .github/scripts/install.sh
        env:
          FRAPPE_BRANCH: version-15

      - name: Tests ausführen
        run: |
          cd $HOME/frappe-bench
          bench --site test_site run-tests --app ktesis --verbose
